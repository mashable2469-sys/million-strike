<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Million Strike Challenge</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#0b0f1a;
color:#e5e7eb;
text-align:center;
}

header{
padding:60px 20px;
background:#020617;
box-shadow:0 0 20px #000;
}

h1{
font-size:38px;
margin:0;
}

.subtitle{
color:#94a3b8;
margin-top:10px;
}

.section{
padding:50px 20px;
}

.card{
background:#111827;
border-radius:15px;
padding:30px;
margin:auto;
max-width:420px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.counter{
font-size:40px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

.progress-bar{
width:100%;
height:15px;
background:#1f2937;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
background:#22c55e;
width:0%;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.timer{
font-size:40px;
margin-top:20px;
}

input{
padding:10px;
width:120px;
border-radius:6px;
border:none;
margin-top:10px;
}

footer{
margin-top:60px;
padding:20px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<header>
<h1>1 Million Strike Challenge</h1>
<p class="subtitle">Consistency beats motivation.</p>
</header>


<div class="section">
<div class="card">

<h2>Strike Counter</h2>

<div class="counter" id="strikeCounter"></div>

<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>

<p id="nextUpdate"></p>

</div>
</div>


<div class="section">
<div class="card">

<h2>Visitor Strike Submission</h2>

<p>Add your strikes</p>

<input id="visitorStrikes" type="number" placeholder="strikes">

<br>

<button onclick="submitStrikes()">Submit</button>

<p id="visitorMessage"></p>

</div>
</div>


<div class="section">
<div class="card">

<h2>Workout Timer</h2>

<div class="timer" id="timer">00:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

</div>
</div>

<footer>
<p>Road to 1,000,000 strikes.</p>
</footer>


<script>

let goal = 1000000;


let strikes = localStorage.getItem("strikes");

if(!strikes){
strikes = 460;
localStorage.setItem("strikes", strikes);
}

strikes = parseInt(strikes);


let lastUpdate = localStorage.getItem("lastUpdate");

function autoUpdate(){

let now = new Date();

let todayUpdate = new Date();

todayUpdate.setHours(23,0,0,0);

if(!lastUpdate){
localStorage.setItem("lastUpdate", now);
}

if(now >= todayUpdate){

let last = new Date(lastUpdate);

if(last < todayUpdate){

strikes += 10;

localStorage.setItem("strikes", strikes);

localStorage.setItem("lastUpdate", now);

}

}

}

autoUpdate();


function updateUI(){

document.getElementById("strikeCounter").innerText =
strikes + " / 1,000,000";

let progress = (strikes/goal)*100;

document.getElementById("progressBar").style.width =
progress + "%";

}

updateUI();


function submitStrikes(){

let add = parseInt(document.getElementById("visitorStrikes").value);

if(!add) return;

strikes += add;

localStorage.setItem("strikes", strikes);

updateUI();

document.getElementById("visitorMessage").innerText =
"Strikes added. Keep going.";

}


function nextUpdateTime(){

let now = new Date();

let update = new Date();

update.setHours(23,0,0,0);

if(now > update){
update.setDate(update.getDate()+1);
}

let diff = update-now;

let hours = Math.floor(diff/1000/60/60);

document.getElementById("nextUpdate").innerText =
"Next +10 strikes at 11 PM ("+hours+" hrs)";
}

nextUpdateTime();



let seconds = 0;
let interval;

function startTimer(){

if(interval) return;

interval = setInterval(function(){

seconds++;

let mins = Math.floor(seconds/60);
let secs = seconds % 60;

document.getElementById("timer").innerText =
String(mins).padStart(2,'0') + ":" +
String(secs).padStart(2,'0');

},1000);
}

function pauseTimer(){
clearInterval(interval);
interval=null;
}

function resetTimer(){
clearInterval(interval);
interval=null;
seconds=0;
document.getElementById("timer").innerText="00:00";
}

</script>

</body>
</html>
