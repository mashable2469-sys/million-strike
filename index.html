<!DOCTYPE html>
<html>
<head>
<title>Challenge Counter</title>
</head>

<body>

<h1>Challenge Counter</h1>

<p>Strikes: <span id="strikes">0</span></p>
<progress id="progress" value="0" max="1000"></progress>

<br><br>

<button onclick="addStrike()">Add Strike</button>

<script>
let strikes = 0;

function addStrike(){
strikes++;
document.getElementById("strikes").innerText = strikes;
document.getElementById("progress").value = strikes;
}
</script>

</body>
</html>
