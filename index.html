<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Million Strike Challenge</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#0b0f1a;
color:#e5e7eb;
text-align:center;
}

header{
padding:50px 20px;
background:#0f172a;
}

h1{
margin:0;
font-size:36px;
}

h2{
margin-top:10px;
color:#94a3b8;
}

.section{
padding:40px 20px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.timer{
font-size:40px;
margin:20px 0;
}
</style>

</head>

<body>

<header>
<h1>1 Million Strike Challenge</h1>
<h2>Build the streak together</h2>
</header>

<div class="section">
<h2>Madhav's Progress</h2>
<p>Day 1 / 1,000,000 strikes</p>
<p>Consistency beats motivation.</p>
</div>

<div class="section">
<h2>Join the Challenge</h2>
<button>Start My Challenge</button>
</div>

<div class="section">
<h2>Workout Timer</h2>
<div class="timer" id="timer">00:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<script>
let seconds = 0;
let interval;

function startTimer(){
interval = setInterval(function(){
seconds++;
let mins = Math.floor(seconds/60);
let secs = seconds % 60;
document.getElementById("timer").innerText =
String(mins).padStart(2,'0') + ":" + String(secs).padStart(2,'0');
},1000);
}

function pauseTimer(){
clearInterval(interval);
}

function resetTimer(){
clearInterval(interval);
seconds = 0;
document.getElementById("timer").innerText="00:00";
}
</script>

</body>
</html>
