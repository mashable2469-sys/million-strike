<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Strike Challenge</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
text-align:center;

background-image:url("logo.png");
background-size:cover;
background-position:center;
background-attachment:fixed;

}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
color:#cbd5f5;
margin-bottom:40px;
}

.counter{
font-size:50px;
font-weight:bold;
color:#22c55e;
}

.progress-bar{
width:280px;
height:14px;
background:#1f2937;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
background:#22c55e;
width:0%;
}

.update{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="overlay">

<h1>1 Million Strike Challenge</h1>

<p class="subtitle">Walking the quiet path.</p>

<div class="counter" id="strikeCounter"></div>

<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>

<p class="update" id="nextUpdate"></p>

</div>


<script>

let goal = 1000000;

let strikes = localStorage.getItem("strikes");

if(!strikes){
strikes = 460;
localStorage.setItem("strikes", strikes);
}

strikes = parseInt(strikes);

let lastUpdate = localStorage.getItem("lastUpdate");

function autoUpdate(){

let now = new Date();

let todayUpdate = new Date();

todayUpdate.setHours(23,0,0,0);

if(!lastUpdate){
localStorage.setItem("lastUpdate", now);
}

if(now >= todayUpdate){

let last = new Date(lastUpdate);

if(last < todayUpdate){

strikes += 10;

localStorage.setItem("strikes", strikes);

localStorage.setItem("lastUpdate", now);

}

}

}

autoUpdate();

function updateUI(){

document.getElementById("strikeCounter").innerText =
strikes + " / 1,000,000";

let progress = (strikes/goal)*100;

document.getElementById("progressBar").style.width =
progress + "%";

}

updateUI();


function nextUpdateTime(){

let now = new Date();

let update = new Date();

update.setHours(23,0,0,0);

if(now > update){
update.setDate(update.getDate()+1);
}

let diff = update-now;

let hours = Math.floor(diff/1000/60/60);

document.getElementById("nextUpdate").innerText =
"Next +10 strikes at 11 PM ("+hours+" hrs)";

}

nextUpdateTime();

</script>

</body>
</html>
