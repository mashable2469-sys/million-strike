<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1 Million Strike Challenge</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:white;
text-align:center;

background-image:url("logo.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
color:#cbd5f5;
margin-bottom:40px;
}

.counter{
font-size:50px;
font-weight:bold;
color:#22c55e;
}

.progress-bar{
width:280px;
height:14px;
background:#1f2937;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
background:#22c55e;
width:0%;
transition:width 0.5s ease;
}

.update{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="overlay">

<h1>1 Million Strike Challenge</h1>

<p class="subtitle" id="subtitle">
104 days completed. Day 105 in progress.
</p>

<div class="counter" id="strikeCounter"></div>

<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>

<p class="update" id="nextUpdate"></p>

</div>

<script>

/* =========================
   SETTINGS
========================= */

const goal = 1000000;

const startingStrikes = 1040;
const startingDay = 105;

/* =========================
   RESET OLD SAVED DATA
========================= */

if(localStorage.getItem("strikes") < startingStrikes){
localStorage.removeItem("strikes");
localStorage.removeItem("currentDay");
localStorage.removeItem("lastUpdateDate");
}

/* =========================
   LOAD STRIKES
========================= */

let strikes = parseInt(localStorage.getItem("strikes"));

if(!strikes){
strikes = startingStrikes;
localStorage.setItem("strikes", strikes);
}

/* =========================
   LOAD DAY
========================= */

let currentDay = parseInt(localStorage.getItem("currentDay"));

if(!currentDay){
currentDay = startingDay;
localStorage.setItem("currentDay", currentDay);
}

/* =========================
   AUTO +10 EVERY DAY AT 11 PM
========================= */

function autoUpdate(){

let now = new Date();

let today11PM = new Date();

today11PM.setHours(23,0,0,0);

let todayKey =
now.getFullYear() + "-" +
(now.getMonth()+1) + "-" +
now.getDate();

let lastUpdateDate =
localStorage.getItem("lastUpdateDate");

if(now >= today11PM && lastUpdateDate !== todayKey){

strikes += 10;
currentDay += 1;

localStorage.setItem("strikes", strikes);
localStorage.setItem("currentDay", currentDay);
localStorage.setItem("lastUpdateDate", todayKey);

updateUI();
}

}

autoUpdate();

/* =========================
   UPDATE SCREEN
========================= */

function updateUI(){

document.getElementById("strikeCounter").innerText =
strikes.toLocaleString() + " / 1,000,000";

let progress = (strikes / goal) * 100;

document.getElementById("progressBar").style.width =
progress + "%";

document.getElementById("subtitle").innerText =
(currentDay - 1) + " days completed. Day " +
currentDay + " in progress.";

document.getElementById("nextUpdate").innerText =
"Next +10 strikes at 11 PM";
}

updateUI();

/* =========================
   LIVE CHECK EVERY MINUTE
========================= */

setInterval(() => {

autoUpdate();
updateUI();

}, 60000);

</script>

</body>
</html>
